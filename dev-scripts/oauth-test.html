<!doctype html>
<!--
  Local tester for the Google OAuth → JWT → api chain (toggle local/prod in the UI).

  Run:
    python3 -m http.server 5173 -d dev-scripts
  then open http://localhost:5173/oauth-test.html

  Serve from 5173 (a TRUSTED origin) so the cross-origin call to auth is allowed.
  For the prod toggle, auth's TRUSTED_ORIGINS must include http://localhost:5173.
-->
<meta charset="utf-8" />
<title>chatarooni — oauth test</title>
<style>
  body { font: 14px/1.5 ui-monospace, monospace; max-width: 720px; margin: 40px auto; padding: 0 16px; }
  button { font: inherit; padding: 8px 14px; cursor: pointer; }
  pre { background: #f4f4f4; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
  fieldset { display: inline-block; margin-bottom: 16px; }
  .endpoints { color: #666; font-size: 12px; margin-bottom: 16px; }
</style>

<h1>Google OAuth → JWT chain</h1>

<fieldset>
  <legend>target</legend>
  <label><input type="radio" name="env" value="local" /> local</label>
  <label><input type="radio" name="env" value="prod" /> prod</label>
</fieldset>
<div class="endpoints" id="endpoints"></div>

<button onclick="login()">Sign in with Google</button>
<button onclick="signOut()">Sign out</button>
<pre id="out">click “Sign in with Google”…</pre>

<script>
  const ENVS = {
    local: { AUTH: 'http://localhost:3001', API: 'http://localhost:3000' },
    prod: {
      AUTH: 'https://auth.chatarooni.com',
      API: 'https://api.chatarooni.com',
    },
  };

  // persist choice across the Google redirect round-trip (same-origin page reload)
  const getEnv = () => localStorage.getItem('oauth-test-env') || 'local';
  const cfg = () => ENVS[getEnv()];
  const out = (s) => (document.getElementById('out').textContent = s);

  function renderEnv() {
    const env = getEnv();
    document.querySelector(`input[value="${env}"]`).checked = true;
    document.getElementById('endpoints').textContent =
      `auth: ${cfg().AUTH}   api: ${cfg().API}`;
  }
  document.querySelectorAll('input[name="env"]').forEach((el) =>
    el.addEventListener('change', (e) => {
      localStorage.setItem('oauth-test-env', e.target.value);
      renderEnv();
    }),
  );

  async function login() {
    const r = await fetch(cfg().AUTH + '/api/auth/sign-in/social', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ provider: 'google', callbackURL: location.href }),
    });
    const data = await r.json();
    if (!data.url) return out('no redirect url:\n' + JSON.stringify(data, null, 2));
    location.href = data.url; // → Google consent → auth callback → back here
  }

  async function signOut() {
    await fetch(cfg().AUTH + '/api/auth/sign-out', { method: 'POST', credentials: 'include' });
    out('signed out.');
  }

  // On return from Google: mint a JWT from the session cookie, then verify it at the api.
  (async () => {
    renderEnv();
    const t = await fetch(cfg().AUTH + '/api/auth/token', { credentials: 'include' });
    if (!t.ok) return; // not signed in yet — leave the prompt
    const { token } = await t.json();
    const me = await fetch(cfg().API + '/api/me', {
      headers: { Authorization: 'Bearer ' + token },
    });
    out(
      `[${getEnv()}] session → JWT minted ✓\n\nJWT:\n` +
        token +
        '\n\nGET ' + cfg().API + '/api/me  [' + me.status + ']:\n' +
        JSON.stringify(await me.json(), null, 2),
    );
  })();
</script>
