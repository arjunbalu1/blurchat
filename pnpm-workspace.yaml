packages:
  - 'apps/*'
  - 'libs/**'
# supply-chain: refuse registry packages published < 24h ago (mirrors Railway)
minimumReleaseAge: 1440
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': false
  '@swc/core': true
  less: false
  nx: true
  protobufjs: false
  unrs-resolver: true
