<!doctype html>
<!-- chatarooni frontend (static). Served by Caddy on Railway at chatarooni.com. -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>chatarooni</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; display: grid; place-items: center; min-height: 100vh; margin: 0; }
  .card { width: min(360px, 90vw); padding: 28px; border: 1px solid #8884; border-radius: 14px; text-align: center; }
  h1 { font-size: 20px; margin: 0 0 20px; }
  button { font: inherit; width: 100%; padding: 11px; border-radius: 9px; border: 1px solid #8886; background: #0000; cursor: pointer; margin-top: 8px; }
  button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; font-weight: 600; }
  img.avatar { width: 64px; height: 64px; border-radius: 50%; margin-bottom: 10px; }
  .muted { color: #8889; font-size: 13px; }
  pre { text-align: left; background: #8881; padding: 10px; border-radius: 8px; font-size: 12px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
</style>

<div class="card" id="app">loading…</div>

<script>
  const AUTH = 'https://auth.chatarooni.com';
  const API = 'https://api.chatarooni.com';
  const app = document.getElementById('app');

  async function getSession() {
    const r = await fetch(AUTH + '/api/auth/get-session', { credentials: 'include' });
    if (!r.ok) return null;
    const data = await r.json();
    return data && data.user ? data : null;
  }

  async function signInGoogle() {
    const r = await fetch(AUTH + '/api/auth/sign-in/social', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ provider: 'google', callbackURL: location.href }),
    });
    const { url } = await r.json();
    location.href = url;
  }

  async function signOut() {
    await fetch(AUTH + '/api/auth/sign-out', { method: 'POST', credentials: 'include' });
    render();
  }

  // proves the Model-2 chain: session → mint JWT → api verifies it via JWKS
  async function verifyApi() {
    const t = await fetch(AUTH + '/api/auth/token', { credentials: 'include' });
    const { token } = await t.json();
    const me = await fetch(API + '/api/me', { headers: { Authorization: 'Bearer ' + token } });
    document.getElementById('out').textContent =
      'GET /api/me  [' + me.status + ']\n' + JSON.stringify(await me.json(), null, 2);
  }

  async function render() {
    app.innerHTML = '<h1>chatarooni</h1><p class="muted">loading…</p>';
    const s = await getSession();
    if (s) {
      app.innerHTML = `
        <h1>chatarooni</h1>
        ${s.user.image ? `<img class="avatar" src="${s.user.image}" alt="" />` : ''}
        <div><b>${s.user.name ?? ''}</b></div>
        <div class="muted">${s.user.email}</div>
        <button class="primary" id="verify">Verify via API</button>
        <button id="signout">Sign out</button>
        <pre id="out"></pre>`;
      document.getElementById('verify').onclick = verifyApi;
      document.getElementById('signout').onclick = signOut;
    } else {
      app.innerHTML = `
        <h1>Sign in to chatarooni</h1>
        <button class="primary" id="google">Sign in with Google</button>
        <p class="muted">You'll be redirected to Google.</p>`;
      document.getElementById('google').onclick = signInGoogle;
    }
  }

  render();
</script>
