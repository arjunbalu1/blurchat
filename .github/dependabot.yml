# Dependabot: automated dependency-update PRs.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# Notes for this repo:
# - "npm" ecosystem covers pnpm too (Dependabot reads pnpm-lock.yaml).
# - Grouping reduces PR noise: one weekly PR per group instead of per package.
# - github-actions ecosystem will auto-PR new versions of actions/checkout,
#   actions/setup-node, pnpm/action-setup, nrwl/nx-set-shas, etc.

version: 2
updates:
  # JS / TS dependencies (pnpm-aware via pnpm-lock.yaml)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    # Hold back major bumps for tools governed by Nx 22's peer requirements.
    # Will move together when we run `nx migrate latest` against Nx 23 stable.
    # @types/node stays pinned to ^24 to keep alignment with Node 24 LTS
    # (Node 25 is "Current", not LTS).
    ignore:
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'webpack-cli'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      nx:
        patterns:
          - 'nx'
          - '@nx/*'
      nestjs:
        patterns:
          - '@nestjs/*'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'typescript-eslint'
          - 'ts-*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'

  # GitHub Actions workflow dependencies (actions/*, pnpm/*, nrwl/*, github/*)
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
