# CodeQL: GitHub's native static analysis for security bugs in JS/TS.
# Runs on PRs, on every push to main, and weekly to catch newly-shipped rules.
# Results land in repo Security → Code scanning.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write   # required to upload SARIF results
      packages: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none    # explicit; JS/TS doesn't need a build to analyze
          # `security-extended` adds more rules at the cost of more time/noise.
          # Start with the default set; opt in later if findings stay clean.
          # queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
